name: K6 Load Testing Pipeline

on:
  push:
    branches: [ main, develop ]
  pull_request:
    branches: [ main ]
  workflow_dispatch:

jobs:
  load-test:
    runs-on: ubuntu-latest
    name: Ejecutar Pruebas de Carga K6

    steps:
      - name: Checkout código
        uses: actions/checkout@v3

      - name: Configurar Node.js
        uses: actions/setup-node@v3
        with:
          node-version: '18'
          cache: 'npm'

      - name: Instalar dependencias
        run: npm install

      - name: Iniciar servidor API
        run: |
          npm start &
          sleep 5
          curl http://localhost:3000/health || true

      - name: Descargar e instalar K6
        run: |
          wget https://github.com/grafana/k6/releases/download/v0.50.0/k6-v0.50.0-linux-amd64.tar.gz
          tar -xzf k6-v0.50.0-linux-amd64.tar.gz
          chmod +x k6-v0.50.0-linux-amd64/k6
          sudo mv k6-v0.50.0-linux-amd64/k6 /usr/local/bin/k6

      - name: Ejecutar pruebas K6 con Grafana Cloud
        run: k6 run --out cloud tests/load-tests.js
        env:
          BASE_URL: http://localhost:3000
          K6_CLOUD_TOKEN: ${{ secrets.K6_CLOUD_TOKEN }}


