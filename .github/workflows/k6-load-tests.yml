name: K6 Load Testing Pipeline

on:
  push:
    branches: [ main, develop ]
  pull_request:
    branches: [ main ]
  schedule:
    - cron: '0 2 * * *'
  workflow_dispatch:

jobs:
  load-test:
    runs-on: ubuntu-latest
    name: Ejecutar Pruebas de Carga K6

    steps:
      - name: Checkout código
        uses: actions/checkout@v3

      - name: Configurar Node.js
        uses: actions/setup-node@v3
        with:
          node-version: '18'
          cache: 'npm'

      - name: Instalar dependencias
        run: npm install

      - name: Iniciar servidor API
        run: |
          npm start &
          sleep 5
          curl http://localhost:3000/health || true

      - name: Ejecutar pruebas K6
        run: npm run test:load
        env:
          BASE_URL: http://localhost:3000

      - name: Crear directorio de resultados
        if: always()
        run: mkdir -p results

      - name: Subir resultados
        if: always()
        uses: actions/upload-artifact@v3
        with:
          name: k6-results
          path: results/
          retention-days: 30

